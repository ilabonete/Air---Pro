<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Service Request - AirPro Inc.</title>
    <link rel="stylesheet" href="/src/style.css">
  </head>
  <body class="page">
    <header class="site-header">
      <div class="container header-inner">
        <a href="/" class="logo">AirPro</a>
        <nav class="nav">
          <a href="/" class="nav-link">Home</a>
          <a href="/services.html" class="nav-link">Services</a>
          <a href="/contact.html" class="nav-link">Contact</a>
          <a href="/admin.html" class="nav-link">Admin</a>
        </nav>
      </div>
    </header>

    <main>
      <section class="page-hero">
        <div class="container">
          <h2>Request a Service</h2>
          <p class="lead">Tell us about your unit and preferred schedule.</p>
        </div>
      </section>

      <section class="section">
        <div class="container">
          <form action="#" method="POST" class="form-card" data-form="service" id="service-form">
            <div class="form-field">
              <label for="name" class="form-label">Name</label>
              <input type="text" id="name" name="name" class="form-input" required>
            </div>
            <div class="form-field">
              <label for="phone" class="form-label">Phone</label>
              <input type="tel" id="phone" name="phone" class="form-input" required>
            </div>
            <div class="form-field">
              <label for="email" class="form-label">Email</label>
              <input type="email" id="email" name="email" class="form-input" required>
            </div>
            <div class="form-field">
              <label for="address" class="form-label">Address</label>
              <input type="text" id="address" name="address" class="form-input" required>
            </div>
            <div class="form-field">
              <label for="aircon_type" class="form-label">Aircon Type</label>
              <select id="aircon_type" name="aircon_type" class="form-select" required>
                <option value="">Select an option</option>
                <option value="split">Split Type</option>
                <option value="window">Window Type</option>
                <option value="inverter">Inverter</option>
                <option value="central">Centralized</option>
              </select>
            </div>
            <div class="form-field">
              <label for="issue" class="form-label">Issue Description</label>
              <textarea id="issue" name="issue" rows="4" class="form-textarea" required></textarea>
            </div>
            <div class="form-field">
              <label for="preferred_date" class="form-label">Preferred Date</label>
              <input type="date" id="preferred_date" name="preferred_date" class="form-input">
            </div>
            <div class="form-field">
              <label for="preferred_time" class="form-label">Preferred Time</label>
              <input type="time" id="preferred_time" name="preferred_time" class="form-input">
            </div>
            <button type="submit" class="btn btn-secondary">
              Submit Request
            </button>
            <div class="form-status" role="status" aria-live="polite"></div>
          </form>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <p>&copy; 2026 AirPro Inc. All rights reserved.</p>
        <p>RBDB & Sons Bldg. F.S. Dizon Road, Bacaca, Davao City, Philippines</p>
      </div>
    </footer>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
